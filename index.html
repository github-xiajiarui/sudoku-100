<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>数独 - 100关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0f1a;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#app{width:100%;max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:6px 8px 0}
#bar{display:flex;justify-content:space-between;align-items:center;padding:4px 2px;flex-shrink:0}
#info{color:#fff;font-size:.8rem;line-height:1.3}
#info .lvl{font-size:1rem;font-weight:700}
#info .lbl{opacity:.6;font-size:.7rem}
#info .err{color:#ff6b6b;font-size:.7rem;margin-left:8px}
#reset{background:rgba(255,255,255,.1);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:.8rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
#reset:active{transform:scale(.95)}
#board{flex:1;display:flex;justify-content:center;align-items:center;min-height:0;position:relative}
canvas{display:block;width:100%;aspect-ratio:1;max-width:100%;max-height:100%;border-radius:6px;touch-action:none;cursor:pointer}
#numpad{flex-shrink:0;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:6px 0}
#numpad button{aspect-ratio:1.6;border:none;border-radius:8px;font-size:1.2rem;font-weight:700;color:#fff;cursor:pointer;background:rgba(255,255,255,.1);-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .1s;font-family:inherit}
#numpad button:active{background:rgba(255,255,255,.25)}
#numpad .erase{background:rgba(255,107,107,.2);color:#ff6b6b}
#numpad .note{background:rgba(100,180,255,.15);color:#64b4ff}
#numpad .note.active{background:rgba(100,180,255,.35)}
#btm{flex-shrink:0;display:flex;gap:6px;padding:4px 0}
.btm-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:inherit}
.btm-btn:active{transform:scale(.96)}
.btm-btn.prev{background:rgba(255,255,255,.08)}
.btm-btn.next{background:#ff6b35}
#ft{text-align:center;color:rgba(255,255,255,.3);font-size:.65rem;padding:0 0 2px;flex-shrink:0}
#complete{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);border-radius:6px;flex-direction:column;justify-content:center;align-items:center;z-index:10;pointer-events:none}
#complete.show{display:flex}
#complete .e{font-size:3rem;margin-bottom:4px}
#complete .t{color:#fff;font-size:1.1rem;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5)}
#complete .s{color:rgba(255,255,255,.6);font-size:.8rem;margin-top:4px}
</style>
</head>

const N=9;
const C=document.getElementById("c"),X=C.getContext("2d");
const lvlEl=document.getElementById("lvl"),diffEl=document.getElementById("diff"),errEl=document.getElementById("err");
const compEl=document.getElementById("complete"),ct=document.getElementById("ct"),cs=document.getElementById("cs");
let cur=0,board=[],given=[],notes=[],sel=null,errs=0,noteMode=false,sz,cs2;

function resize(){
  const r=C.getBoundingClientRect();
  sz=Math.round(r.width);
  const d=devicePixelRatio||1;
  C.width=sz*d;C.height=sz*d;X.setTransform(d,0,0,d,0,0);
  draw();
}
resize();window.addEventListener("resize",resize);

function load(n){
  const lvl=LEVELS[n];
  given=lvl.p.map(r=>[...r]);
  board=lvl.p.map(r=>[...r]);
  notes=Array.from({length:N},()=>Array.from({length:N},()=>[]));
  sel=null;errs=0;cur=n;
  compEl.classList.remove("show");errEl.textContent="";
  lvlEl.textContent="第 "+lvl.i+" 关";
  diffEl.textContent=lvl.d;
  draw();
}

function draw(){
  const S=sz;cs2=S/N;
  X.fillStyle="#1a1a2e";X.fillRect(0,0,S,S);
  X.strokeStyle="rgba(255,255,255,.1)";X.lineWidth=.5;
  for(let i=1;i<N;i++){const p=i*cs2;X.beginPath();X.moveTo(p,0);X.lineTo(p,S);X.stroke();X.beginPath();X.moveTo(0,p);X.lineTo(S,p);X.stroke()}
  X.strokeStyle="rgba(255,255,255,.3)";X.lineWidth=2;
  for(let i=0;i<=N;i+=3){const p=i*cs2;X.beginPath();X.moveTo(p,0);X.lineTo(p,S);X.stroke();X.beginPath();X.moveTo(0,p);X.lineTo(S,p);X.stroke()}
  if(sel){
    const sr=sel[0],sc=sel[1];
    X.fillStyle="rgba(100,180,255,.15)";X.fillRect(sc*cs2,sr*cs2,cs2,cs2);
    const v=board[sr][sc];
    if(v>0)for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(board[r][c]===v&&(r!==sr||c!==sc)){X.fillStyle="rgba(100,180,255,.08)";X.fillRect(c*cs2,r*cs2,cs2,cs2)}
  }
  X.textAlign="center";X.textBaseline="middle";
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const v=board[r][c],x=c*cs2+cs2/2,y=r*cs2+cs2/2;
    if(v>0){
      X.fillStyle=given[r][c]!==0?"#ddd":"#64b4ff";
      X.font=(given[r][c]!==0?"bold ":"")+(cs2*.5)+"px 'Segoe UI',sans-serif";
      X.fillText(v,x,y+1);
    }else if(notes[r][c].length>0){
      const ns2=cs2/3.2,fs=cs2*.2;
      X.fillStyle="rgba(255,255,255,.35)";X.font=fs+"px 'Segoe UI',sans-serif";
      for(const n of notes[r][c]){
        const nr=Math.floor((n-1)/3),nc=(n-1)%3;
        X.fillText(n,x+(nc-1)*ns2+cs2*.04,y+(nr-1)*ns2);
      }
    }
  }
  if(sel){
    const sr=sel[0],sc=sel[1];
    X.strokeStyle="#64b4ff";X.lineWidth=2.5;
    X.strokeRect(sc*cs2+1,sr*cs2+1,cs2-2,cs2-2);
  }
}

function checkDone(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(board[r][c]!==LEVELS[cur].s[r][c])return false;
  return true;
}

function place(v){
  if(!sel)return;
  const r=sel[0],c=sel[1];
  if(given[r][c]!==0)return;
  if(noteMode){
    const i=notes[r][c].indexOf(v);
    if(i>=0)notes[r][c].splice(i,1);else if(!board[r][c]){notes[r][c].push(v);notes[r][c].sort((a,b)=>a-b)}
    draw();return;
  }
  notes[r][c]=[];
  if(board[r][c]===v){board[r][c]=0;draw();return}
  if(v!==LEVELS[cur].s[r][c]){errs++;errEl.textContent="❌ "+errs;draw();return}
  board[r][c]=v;
  draw();
  if(checkDone()){ct.textContent="🎉 恭喜过关！";cs.textContent="第 "+LEVELS[cur].i+" 关 · 错误 "+errs+" 次";compEl.classList.add("show");}
}

function erase(){
  if(!sel)return;const r=sel[0],c=sel[1];if(given[r][c]!==0)return;board[r][c]=0;notes[r][c]=[];draw();
}

C.addEventListener("touchstart",function(e){e.preventDefault();const r=C.getBoundingClientRect();let x,y;if(e.touches){x=e.touches[0].clientX-r.left;y=e.touches[0].clientY-r.top}else{x=e.clientX-r.left;y=e.clientY-r.top};const s=sz/r.width;const c=(x*s/cs2)|0,r2=(y*s/cs2)|0;if(r2>=0&&r2<N&&c>=0&&c<N){sel=[r2,c];draw()}},{passive:false});
C.addEventListener("mousedown",function(e){const r=C.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;const s=sz/r.width;const c=(x*s/cs2)|0,r2=(y*s/cs2)|0;if(r2>=0&&r2<N&&c>=0&&c<N){sel=[r2,c];draw()}});

const pad=document.getElementById("numpad");
for(let n=1;n<=9;n++){const b=document.createElement("button");b.textContent=n;b.addEventListener("touchstart",function(e){e.preventDefault();place(n)},{passive:false});b.addEventListener("mousedown",function(e){e.preventDefault();place(n)});pad.appendChild(b)}
const eb=document.createElement("button");eb.textContent="✕";eb.className="erase";
eb.addEventListener("touchstart",function(e){e.preventDefault();erase()},{passive:false});
eb.addEventListener("mousedown",function(e){e.preventDefault();erase()});pad.appendChild(eb);
const nb=document.createElement("button");nb.textContent="📝";nb.className="note";
nb.addEventListener("touchstart",function(e){e.preventDefault();noteMode=!noteMode;nb.classList.toggle("active")},{passive:false});
nb.addEventListener("mousedown",function(e){e.preventDefault();noteMode=!noteMode;nb.classList.toggle("active")});pad.appendChild(nb);

document.getElementById("prev").addEventListener("touchstart",function(e){e.preventDefault();if(cur>0)load(cur-1)},{passive:false});
document.getElementById("prev").addEventListener("mousedown",function(e){if(cur>0)load(cur-1)});
document.getElementById("next").addEventListener("touchstart",function(e){e.preventDefault();if(cur<99)load(cur+1)},{passive:false});
document.getElementById("next").addEventListener("mousedown",function(e){if(cur<99)load(cur+1)});
document.getElementById("reset").addEventListener("touchstart",function(e){e.preventDefault();load(cur)},{passive:false});
document.getElementById("reset").addEventListener("mousedown",function(e){load(cur)});
document.addEventListener("keydown",function(e){if(e.key>="1"&&e.key<="9")place(parseInt(e.key));if(e.key==="Backspace"||e.key==="Delete")erase()});
load(0);
})();
