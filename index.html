.bb:active{transform:scale(.96)}
.bb.pr{background:rgba(255,255,255,.07)}
.bb.nx{background:#ff6b35}
#ft{text-align:center;color:rgba(255,255,255,.25);font-size:.65rem;padding:0 0 2px;flex-shrink:0}
#ov{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);border-radius:6px;flex-direction:column;justify-content:center;align-items:center;z-index:10;pointer-events:none}

#ov .t{color:#fff;font-size:1.2rem;font-weight:700}
